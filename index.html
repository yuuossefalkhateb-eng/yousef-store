<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر يوسف الخطيب 🪽</title>
    <style>
        :root { --gold: #ffb100; --glass: rgba(15, 23, 42, 0.95); --red: #e74c3c; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: url('https://wallpaperaccess.com/full/1155026.jpg') no-repeat center center fixed; 
            background-size: cover; color: white; text-align: center; margin: 0; min-height: 100vh; 
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: -1; }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--glass); padding: 25px; border-radius: 20px; margin: 15px auto; max-width: 380px; border: 1px solid rgba(255, 177, 0, 0.3); backdrop-filter: blur(15px); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; background: rgba(0,0,0,0.6); color: white; border: 1px solid var(--gold); text-align: center; }
        .btn { color: black; padding: 12px 20px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        .main-btn { background: linear-gradient(45deg, #ffb100, #ff8c00); width: 100%; margin-top: 10px; }
        .header { background: rgba(10,14,20,0.95); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .tab-container { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .tab-btn { background: #1e293b; color: white; flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); cursor: pointer; }
        .tab-btn.active-tab { background: var(--gold); color: black; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item { background: rgba(30, 41, 59, 0.7); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .logout-btn { background: var(--red); color: white; padding: 5px 10px; font-size: 12px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="authPage" class="page active">
        <br><h1 style="color: var(--gold);">متجر يوسف الخطيب 🪽</h1>
        <div class="card" id="loginBox">
            <h3>تسجيل الدخول</h3>
            <input type="text" id="u" placeholder="اسم المستخدم">
            <input type="password" id="p" placeholder="كلمة السر">
            <button class="btn main-btn" onclick="handleAuth('login')">دخول</button>
            <p style="font-size: 13px; margin-top: 15px;" onclick="toggleAuth(false)">ليس لديك حساب؟ <span style="color: var(--gold); cursor: pointer;">إنشاء حساب</span></p>
        </div>
        <div class="card" id="registerBox" style="display: none;">
            <h3>إنشاء حساب جديد</h3>
            <input type="text" id="ru" placeholder="اسم المستخدم">
            <input type="password" id="rp" placeholder="كلمة السر">
            <button class="btn main-btn" style="background: #2ecc71;" onclick="handleAuth('reg')">تأكيد الإنشاء</button>
            <p style="font-size: 13px; margin-top: 15px;" onclick="toggleAuth(true)">لديك حساب؟ <span style="color: var(--gold); cursor: pointer;">دخول</span></p>
        </div>
    </div>

    <div id="shopPage" class="page" style="padding:0;">
        <div class="header">
            <div><span>👤 <span id="curUser"></span></span> <button class="logout-btn" onclick="logout()">خروج</button></div>
            <div style="text-align: left;"><span style="color:#2ecc71; font-weight:bold;"><span id="balance">0</span> ل.س</span><br>
            <button onclick="showPage('rechargePage')" style="background:none; border:none; color:var(--gold); font-size: 11px;">+ شحن</button></div>
        </div>
        <div style="padding: 20px;">
            <div class="tab-container">
                <button id="pubgTab" class="tab-btn active-tab" onclick="switchGame('pubg')">PUBG Mobile</button>
                <button id="ffTab" class="tab-btn" onclick="switchGame('ff')">Free Fire</button>
            </div>
            <div id="pubgSection" class="game-section grid">
                <div class="item"><h4>60 UC</h4><p>150 ل.س</p><button class="btn main-btn" onclick="processPurchase('60 UC', 150)">شراء</button></div>
                <div class="item"><h4>325 UC</h4><p>670 ل.س</p><button class="btn main-btn" onclick="processPurchase('325 UC', 670)">شراء</button></div>
                <div class="item"><h4>660 UC</h4><p>1300 ل.س</p><button class="btn main-btn" onclick="processPurchase('660 UC', 1300)">شراء</button></div>
                <div class="item"><h4>1800 UC</h4><p>2300 ل.س</p><button class="btn main-btn" onclick="processPurchase('1800 UC', 2300)">شراء</button></div>
            </div>
            <div id="ffSection" class="game-section grid" style="display: none;">
                <div class="item"><h4>110 جواهر</h4><p>150 ل.س</p><button class="btn main-btn" style="background:#3498db;" onclick="processPurchase('110 جواهر FF', 150)">شراء</button></div>
                <div class="item"><h4>220 جواهر</h4><p>300 ل.س</p><button class="btn main-btn" style="background:#3498db;" onclick="processPurchase('220 جواهر FF', 300)">شراء</button></div>
            </div>
            <p onclick="checkAdmin()" style="margin-top:40px; font-size:10px; opacity:0.3; cursor:pointer;">⚙️ الإدارة</p>
        </div>
    </div>

    <div id="rechargePage" class="page">
        <div class="card">
            <h3>تعبئة الرصيد</h3>
            <div style="background:white; padding:10px; border-radius:15px; display:inline-block; margin-bottom:10px;">
                <img src="https://i.imgur.com/R9D6DsJ.jpeg" alt="QR Code" style="max-width:160px; border-radius:10px; display:block;">
            </div>
            <div style="background:black; padding:10px; border-radius:8px; color:var(--gold); font-size:11px; margin-bottom:10px; border:1px dashed var(--gold);">b597240f7f2ca485503f4e5fc39d1287</div>
            <input type="number" id="amt" placeholder="المبلغ الذي حولته">
            <button class="btn main-btn" onclick="requestDeposit()">تأكيد</button>
            <button class="btn" style="background:none; color:white; margin-top:10px;" onclick="showPage('shopPage')">إلغاء</button>
        </div>
    </div>

    <div id="adminPage" class="page">
        <div class="card">
            <h2>الطلبات ⚙️</h2>
            <div id="adminList"></div>
            <button class="btn main-btn" onclick="showPage('shopPage')">إغلاق</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCW-0rfJbFRV06tMVDHwpPNUL1grBLaYJU",
            authDomain: "alhakimstore-f420b.firebaseapp.com",
            projectId: "alhakimstore-f420b",
            storageBucket: "alhakimstore-f420b.firebasestorage.app",
            messagingSenderId: "847782210556",
            appId: "1:847782210556:web:9053a6725a8ecfcf18a079"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.toggleAuth = (isLogin) => {
            document.getElementById('loginBox').style.display = isLogin ? 'block' : 'none';
            document.getElementById('registerBox').style.display = isLogin ? 'none' : 'block';
        };

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.switchGame = (game) => {
            document.querySelectorAll('.game-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            if(game === 'pubg') { document.getElementById('pubgSection').style.display = 'grid'; document.getElementById('pubgTab').classList.add('active-tab'); }
            else { document.getElementById('ffSection').style.display = 'grid'; document.getElementById('ffTab').classList.add('active-tab'); }
        };

        window.handleAuth = async (type) => {
            const user = (type === 'login' ? document.getElementById('u').value : document.getElementById('ru').value).trim();
            const pass = type === 'login' ? document.getElementById('p').value : document.getElementById('rp').value;
            if(!user || !pass) return alert("اكمل البيانات");
            const ref = doc(db, "users", user);
            const snap = await getDoc(ref);
            if(type === 'login') {
                if(snap.exists() && snap.data().pass === pass) login(user);
                else alert("خطأ في البيانات");
            } else {
                if(snap.exists()) alert("الاسم محجوز");
                else { await setDoc(ref, { pass, balance: 0 }); login(user); }
            }
        };

        function login(user) {
            localStorage.setItem('activeUser', user);
            document.getElementById('curUser').innerText = user;
            showPage('shopPage');
            onSnapshot(doc(db, "users", user), (d) => {
                if(d.exists()) document.getElementById('balance').innerText = d.data().balance.toLocaleString();
            });
        }

        window.logout = () => { localStorage.removeItem('activeUser'); location.reload(); };

        // نظام الخصم الفوري عند الطلب
        window.processPurchase = async (details, price) => {
            const user = localStorage.getItem('activeUser');
            const userRef = doc(db, "users", user);
            const snap = await getDoc(userRef);
            
            if(snap.data().balance < price) return alert("رصيدك غير كافٍ!");
            
            const playerID = prompt("أدخل ID اللاعب:");
            if(!playerID) return;

            // خصم الرصيد فوراً من الزبون
            const newBalance = snap.data().balance - price;
            await updateDoc(userRef, { balance: newBalance });

            // إرسال الطلب للإدارة
            await addDoc(collection(db, "orders"), { 
                user, details: details + " لـ " + playerID, amount: price, type: 'شراء', status: 'pending' 
            });
            alert("تم خصم الرصيد وإرسال طلبك للمدير!");
        };

        window.requestDeposit = async () => {
            const amt = document.getElementById('amt').value;
            if(!amt) return;
            await addDoc(collection(db, "orders"), { 
                user: localStorage.getItem('activeUser'), type: 'إيداع', amount: parseInt(amt), status: 'pending' 
            });
            alert("تم إرسال طلب الشحن!");
            showPage('shopPage');
        };

        window.checkAdmin = () => {
            if(prompt("كلمة سر المدير:") === "12362353339") { showPage('adminPage'); loadAdmin(); }
        };

        function loadAdmin() {
            onSnapshot(collection(db, "orders"), (s) => {
                const list = document.getElementById('adminList');
                list.innerHTML = "";
                s.forEach((d) => {
                    const o = d.data();
                    if(o.status === 'pending') {
                        const div = document.createElement('div');
                        div.style.borderBottom = "1px solid gold"; div.style.padding = "10px";
                        div.innerHTML = `<p style="font-size:12px;">👤 ${o.user}<br>📦 ${o.details || o.amount + ' ل.س'}</p>`;
                        
                        const b1 = document.createElement('button');
                        b1.innerText = '✅'; b1.className = 'btn'; b1.style.background = '#2ecc71';
                        b1.onclick = () => approve(d.id, o.user, o.amount, o.type);
                        
                        const b2 = document.createElement('button');
                        b2.innerText = '❌'; b2.className = 'btn'; b2.style.background = '#e74c3c';
                        b2.onclick = () => reject(d.id, o.user, o.amount, o.type);
                        
                        div.appendChild(b1); div.appendChild(b2);
                        list.appendChild(div);
                    }
                });
            });
        }

        async function approve(orderID, uid, amt, type) {
            if(type === 'إيداع') {
                const ref = doc(db, "users", uid);
                const s = await getDoc(ref);
                await updateDoc(ref, { balance: s.data().balance + amt });
            }
            await updateDoc(doc(db, "orders", orderID), { status: 'done' });
        }

        async function reject(orderID, uid, amt, type) {
            // إذا كان طلب شراء، نعيد الرصيد للزبون لأنه خُصم منه عند الضغط
            if(type === 'شراء') {
                const ref = doc(db, "users", uid);
                const s = await getDoc(ref);
                await updateDoc(ref, { balance: s.data().balance + amt });
                alert("تم رفض الطلب وإعادة الرصيد للزبون");
            }
            await deleteDoc(doc(db, "orders", orderID));
        }

        const savedUser = localStorage.getItem('activeUser');
        if(savedUser) login(savedUser);
    </script>
</body>
</html>
